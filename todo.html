<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>할 일 화면 페이지</title>

    <link rel="stylesheet" href="CSS/basic.css" />
    <link rel="stylesheet" href="CSS/page/todo.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <div class="container">
        <div class="todo">
          <!-- Header -->
          <header class="todo-header">
            <div class="todo-top">
              <div class="search-box">
                <img src="assets/icons/search.svg" alt="" class="search-icon" />
                <input type="text" placeholder="검색" />
              </div>
            </div>

            <div class="todo-info">
              <div class="todo-date">
                <div class="date-left">9월</div>

                <div class="date-right">
                  <span class="date-day">20일</span>
                  <span class="date-year">2026년</span>
                </div>
              </div>

              <div class="progress-card">
                <strong class="progress-title">오늘 진행률</strong>

                <div class="progress-content">
                  <div class="progress-circle">2/3</div>

                  <div class="progress-text">
                    <span>전체 3개 중</span>
                    <strong>2개 완료</strong>
                  </div>
                </div>
              </div>
            </div>
          </header>

          <!-- Main -->
          <main class="todo-main">
            <div class="todo-tab">
              <button type="button" class="tab-btn active">오늘</button>
              <button type="button" class="tab-btn">이번 주</button>
              <button type="button" class="tab-btn">이번 달</button>
            </div>

            <div class="todo-filter">
              <div class="filter-left">
                <button type="button" class="filter-btn active">전체</button>
                <button type="button" class="filter-btn">진행 중</button>
                <button type="button" class="filter-btn">완료</button>
              </div>

              <button type="button" class="sort-btn">
                등록순
                <span>⌄</span>
              </button>
            </div>

            <section class="todo-list">
              <div class="todo-item">
                <div class="todo-bar"></div>

                <div class="todo-content">
                  <p class="todo-title">자료구조 강의 듣기</p>
                  <span class="todo-time">1시간 30분 소요</span>
                </div>

                <img
                  src="assets/icons/check-in.svg"
                  alt=""
                  class="todo-check"
                />
              </div>

              <div class="todo-item">
                <div class="todo-bar"></div>

                <div class="todo-content">
                  <p class="todo-title">와이어프레임 제작</p>
                  <span class="todo-time">1시간 소요</span>
                </div>

                <img
                  src="assets/icons/check-in.svg"
                  alt=""
                  class="todo-check"
                />
              </div>

              <div class="todo-item">
                <div class="todo-bar"></div>

                <div class="todo-content">
                  <p class="todo-title">자료구조 강의 듣기</p>
                  <span class="todo-time">30분 소요</span>
                </div>

                <img
                  src="assets/icons/check-out.svg"
                  alt=""
                  class="todo-check"
                />
              </div>
            </section>
          </main>

          <!-- 플러스 버튼 -->
          <button
            type="button"
            class="fab-btn"
            aria-label="할 일 추가"
            id="openScheduleModal"
          >
            <img src="assets/icons/puls.svg" alt="" />
          </button>

          <!-- 일정 추가 모달 -->
          <div class="modal-overlay" id="scheduleModal">
            <div class="schedule-modal">
              <button
                type="button"
                class="modal-close"
                id="closeScheduleModal"
                aria-label="모달 닫기"
              >
                ×
              </button>

              <h2 class="modal-title">할 일 추가하기</h2>

              <form class="schedule-form">
                <div class="form-group">
                  <label for="scheduleTitle">할 일 이름</label>
                  <input
                    type="text"
                    id="scheduleTitle"
                    placeholder="예: 강의 듣기"
                  />
                </div>

                <div class="form-group">
                  <label for="scheduleStart">시작 시간</label>
                  <input type="time" id="scheduleStart" />
                </div>

                <div class="form-group">
                  <label for="scheduleEnd">종료 시간</label>
                  <input type="time" id="scheduleEnd" />
                </div>

                <div class="form-group">
                  <label for="scheduleMemo">메모</label>
                  <textarea
                    id="scheduleMemo"
                    rows="4"
                    placeholder="메모를 입력하세요"
                  ></textarea>
                </div>

                <button type="submit" class="modal-submit-btn">추가하기</button>
              </form>
            </div>
          </div>

          <!-- Footer -->
          <footer class="todo-footer">
            <nav class="nav">
              <a href="home.html" class="nav-item" aria-label="홈">
                <img src="assets/icons/home.svg" alt="" class="nav-icon" />
                <span class="nav-indicator"></span>
              </a>

              <a href="schedule.html" class="nav-item" aria-label="일정">
                <img src="assets/icons/schedule.svg" alt="" class="nav-icon" />
              </a>

              <a href="todo.html" class="nav-item active" aria-label="할 일">
                <img src="assets/icons/todo.svg" alt="" class="nav-icon" />
              </a>

              <a href="profile.html" class="nav-item" aria-label="프로필">
                <img src="assets/icons/user.svg" alt="" class="nav-icon" />
              </a>
            </nav>
          </footer>
        </div>
      </div>
    </div>
  </body>
</html>
