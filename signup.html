<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>회원가입 페이지</title>

    <link rel="stylesheet" href="CSS/basic.css" />
    <link rel="stylesheet" href="CSS/page/signup.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <div class="container">
        <div class="signup">
          <!-- 헤더 -->
          <header class="header">
            <h1 class="heading-1">회원가입</h1>
            <p class="body">편한 일정 관리를 원하시면 가입하세요.</p>
          </header>

          <!-- 메인 -->
          <main class="main">
            <form class="signup-wrapper">
              <!-- 이메일 -->
              <div class="form-group">
                <label>이메일 <span class="required">*</span></label>
                <div class="input">
                  <img src="assets/icons/email.svg" alt="email" />
                  <input type="email" placeholder="whattodo@gmail.com" />
                </div>
              </div>

              <!-- 비밀번호 -->
              <div class="form-group">
                <label>비밀번호 <span class="required">*</span></label>
                <div class="input">
                  <img src="assets/icons/password.svg" alt="" />
                  <input
                    type="password"
                    placeholder="8자리 이상 입력해주세요."
                  />
                </div>
              </div>

              <!-- 비밀번호 확인 -->
              <div class="form-group">
                <label>비밀번호 확인 <span class="required">*</span></label>
                <div class="input">
                  <img src="assets/icons/password.svg" alt="" />
                  <input
                    type="password"
                    placeholder="다시 한번 입력해주세요."
                  />
                </div>
              </div>
            </form>
          </main>

          <!-- 푸터 -->
          <footer class="footer">
            <!-- 회원가입 버튼 -->
            <button type="submit" class="btn">이메일로 회원가입</button>
          </footer>
        </div>
      </div>
    </div>
  </body>
</html>
