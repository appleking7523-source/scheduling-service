<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>프로필 페이지</title>
  </head>
  <body>
    <div class="layout">
      <div class="container">
        <div class="profile">
          <!-- Header -->
          <header class="profile-header">
            <button class="back-btn">
              <img src="assets/icons/arrow-left.svg" alt="" />
            </button>
            <h1 class="heading-2">프로필</h1>
          </header>

          <!-- Main -->
          <main class="profile-main">
            <!-- 유저 정보 -->
            <section class="profile-user">
              <div class="avatar">홍</div>

              <div class="user-info">
                <p class="user-name">홍길동 님</p>
                <span class="user-email">hong@example.com</span>
              </div>
            </section>

            <!-- 통계 -->
            <section class="profile-card">
              <div class="profile-item">
                <img src="assets/icons/chart.svg" alt="" />
                <span>하루 진행률 90%</span>
              </div>

              <div class="profile-item">
                <img src="assets/icons/check.svg" alt="" />
                <span>완료한 할 일 12개</span>
              </div>
            </section>

            <!-- 메뉴 -->
            <section class="profile-card">
              <div class="profile-menu">
                <img src="assets/icons/notice.svg" alt="" />
                <span>공지사항</span>
              </div>

              <div class="profile-menu">
                <img src="assets/icons/help.svg" alt="" />
                <span>문의사항</span>
              </div>

              <div class="profile-menu">
                <img src="assets/icons/setting.svg" alt="" />
                <span>설정</span>
              </div>
            </section>

            <!-- 로그아웃 -->
            <section class="logout-box">
              <span>로그아웃</span>
            </section>
          </main>

          <!-- Footer -->
          <footer class="profile-footer"></footer>
        </div>
      </div>
    </div>
  </body>
</html>
