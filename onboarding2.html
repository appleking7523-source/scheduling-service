<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>온보딩 두 번째 페이지</title>

    <link rel="stylesheet" href="CSS/basic.css" />
    <link rel="stylesheet" href="CSS/page/onboarding2.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <div class="container">
        <div class="onboarding">
          <!-- 헤더 -->
          <header class="header">
            <img src="assets/icons/onbo2.svg" alt="" class="onbo2" />
            <div class="text">
              <h1 class="heading-1">할 일을 정리하고</h1>
              <h1 class="heading-1">일정에 맞게 관리하세요</h1>
            </div>
          </header>

          <!-- 메인 -->
          <main class="main">
            <div class="text">
              <p class="heading-3">매일 할 일을 확인하고</p>
              <p class="heading-3">효율적으로 과제를 정리해보세요</p>
            </div>

            <button type="button" class="btn" id="nextBtn">다음</button>
            <button type="button" class="skip-btn" id="skipBtn">건너뛰기</button>
            </button>
          </main>

          <!-- 푸터 -->
          <footer class="footer">
            <!-- <button class="skip-btn">건너뛰기</button> -->

            <div class="pagination">
              <span class="dot"></span>
              <span class="dot active"></span>
              <span class="dot"></span>
            </div>
          </footer>
        </div>
      </div>
    </div>
  </body>
</html>
