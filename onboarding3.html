<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>온보딩 세 번째 페이지</title>

    <link rel="stylesheet" href="CSS/basic.css" />
    <link rel="stylesheet" href="CSS/page/onboarding3.css" />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <div class="container">
        <div class="onboarding">
          <!-- 헤더 -->
          <header class="header">
            <img src="assets/icons/onbo3.svg" alt="" class="onbo3" />
            <div class="text">
              <h1 class="heading-1">중요한 일정을 잊지 않도록</h1>
              <h1 class="heading-1">알림을 받아보세요</h1>
            </div>
          </header>

          <!-- 메인 -->
          <main class="main">
            <div class="text">
              <p class="heading-3">과제 기한, 스터디 시간 등</p>
              <p class="heading-3">중요한 일정에 대해 미리 알려드려요</p>
            </div>

            <button type="button" class="btn" id="nextBtn">시작히기</button>
            <!-- <button type="button" class="skip-btn" id="skipBtn">
              건너뛰기 -->
            </button>
          </main>

          <!-- 푸터 -->
          <footer class="footer">
            <div class="pagination">
              <span class="dot"></span>
              <span class="dot"></span>
              <span class="dot active"></span>
            </div>
          </footer>
        </div>
      </div>
    </div>
  </body>
</html>
